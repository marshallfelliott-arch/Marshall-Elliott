<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runner Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #dff6ff, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-wrapper {
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      margin-bottom: 12px;
      color: #555;
    }

    canvas {
      border: 3px solid #333;
      background: #fff;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
    }

    .controls {
      margin-top: 12px;
      color: #444;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>Runner Game</h1>
    <p>Press space, W, or ↑ to jump. Press R to restart.</p>
    <canvas id="gameCanvas" width="900" height="300"></canvas>
    <div class="controls">Avoid the cacti and survive as long as possible.</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const groundY = 240;
    const gravity = 0.75;

    let score = 0;
    let bossActive = false;
    let bossHealth = 20;
    let bossX = canvas.width + 200;
    let bossDefeated = false;
    const bullets = [];
    let highScore = 0;
    let gameSpeed = 6;
    let frameCount = 0;
    let gameOver = false;
    let started = false;

    const player = {
      x: 80,
      y: groundY - 50,
      width: 42,
      height: 50,
      velocityY: 0,
      jumpPower: -14,
      grounded: true,
      color: "#222"
    };

    const obstacles = [];
    const clouds = [];

    function createCloud() {
      clouds.push({
        x: canvas.width + Math.random() * 200,
        y: 30 + Math.random() * 70,
        width: 50 + Math.random() * 30,
        height: 20,
        speed: 1 + Math.random() * 1.2
      });
    }

    for (let i = 0; i < 4; i++) {
      createCloud();
      clouds[i].x = i * 220 + 100;
    }

    function jump() {
      if (player.grounded && !gameOver) {
        player.velocityY = player.jumpPower;
        player.grounded = false;
        started = true;
      }
    }

    function restartGame() {
      score = 0;
      gameSpeed = 6;
      frameCount = 0;
      gameOver = false;
      started = false;
      bossActive = false;
      bossDefeated = false;
      bossHealth = 20;
      bossX = canvas.width + 200;
      obstacles.length = 0;
      bullets.length = 0;
      player.y = groundY - player.height;
      player.velocityY = 0;
      player.grounded = true;
    }

    function spawnObstacle() {
      const type = Math.random();

      if (type < 0.65) {
        const width = 18 + Math.random() * 18;
        const height = 30 + Math.random() * 30;
        obstacles.push({
          x: canvas.width,
          y: groundY - height,
          width,
          height,
          kind: "cactus",
          shootable: true
        });
      } else if (type < 0.9) {
        const width = 34;
        const height = 24;
        const flyHeight = groundY - 90 - Math.random() * 40;
        obstacles.push({
          x: canvas.width,
          y: flyHeight,
          width,
          height,
          kind: "bird",
          flapFrame: 0,
          shootable: true
        });
      } else {
        obstacles.push({
          x: canvas.width,
          y: groundY - 42,
          width: 42,
          height: 42,
          kind: "rock",
          shootable: false
        });
      }
    }

    function updatePlayer() {
      player.velocityY += gravity;
      player.y += player.velocityY;

      if (player.y >= groundY - player.height) {
        player.y = groundY - player.height;
        player.velocityY = 0;
        player.grounded = true;
      }
    }

    function updateObstacles() {
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;

        if (obstacles[i].kind === "bird") {
          obstacles[i].flapFrame += 1;
        }

        if (obstacles[i].x + obstacles[i].width < 0) {
          obstacles.splice(i, 1);
          score++;
          if (score > highScore) highScore = score;
        }
      }
    }

    function shoot() {
      if (gameOver || !started) return;
      bullets.push({
        x: player.x + player.width + 6,
        y: player.y + 22,
        width: 14,
        height: 4,
        speed: 11
      });
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].speed;

        if (bullets[i].x > canvas.width + 20) {
          bullets.splice(i, 1);
          continue;
        }

        let bulletRemoved = false;

        for (let j = obstacles.length - 1; j >= 0; j--) {
          const b = bullets[i];
          const o = obstacles[j];

          const hit = (
            b.x < o.x + o.width &&
            b.x + b.width > o.x &&
            b.y < o.y + o.height &&
            b.y + b.height > o.y
          );

          if (hit) {
            if (o.shootable) {
              obstacles.splice(j, 1);
              score += 2;
              if (score > highScore) highScore = score;
            }
            bullets.splice(i, 1);
            bulletRemoved = true;
            break;
          }
        }

        if (bulletRemoved) continue;

        if (bossActive && bullets[i]) {
          const bossHit = (
            bullets[i].x < bossX + 120 &&
            bullets[i].x + bullets[i].width > bossX &&
            bullets[i].y < groundY - 20 &&
            bullets[i].y + bullets[i].height > groundY - 80
          );

          if (bossHit) {
            bossHealth--;
            bullets.splice(i, 1);

            if (bossHealth <= 0) {
              bossActive = false;
              bossDefeated = true;
              score += 15;
              if (score > highScore) highScore = score;
            }
          }
        }
      }
    }

    function updateClouds() {
      for (const cloud of clouds) {
        cloud.x -= cloud.speed;
        if (cloud.x + cloud.width < 0) {
          cloud.x = canvas.width + Math.random() * 150;
          cloud.y = 30 + Math.random() * 70;
        }
      }
    }

    function checkCollision() {
      for (const obs of obstacles) {
        const padding = 5;
        if (
          player.x + padding < obs.x + obs.width &&
          player.x + player.width - padding > obs.x &&
          player.y + padding < obs.y + obs.height &&
          player.y + player.height - padding > obs.y
        ) {
          gameOver = true;
        }
      }
    }

    function drawGround() {
      ctx.strokeStyle = "#555";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();

      for (let i = 0; i < canvas.width; i += 24) {
        ctx.fillStyle = "#999";
        ctx.fillRect((i - (frameCount * gameSpeed * 0.5) % 24), groundY + 8, 12, 3);
      }
    }

    function drawPlayer() {
      ctx.fillStyle = player.color;

      // Body
      ctx.fillRect(player.x + 8, player.y + 10, 20, 24);

      // Head
      ctx.fillRect(player.x + 22, player.y, 16, 14);

      // Tail
      ctx.fillRect(player.x, player.y + 20, 10, 6);

      // Legs animation
      const legOffset = Math.sin(frameCount * 0.35) * 4;
      if (player.grounded && started && !gameOver) {
        ctx.fillRect(player.x + 10, player.y + 34, 6, 16 + legOffset);
        ctx.fillRect(player.x + 22, player.y + 34, 6, 16 - legOffset);
      } else {
        ctx.fillRect(player.x + 10, player.y + 34, 6, 16);
        ctx.fillRect(player.x + 22, player.y + 34, 6, 16);
      }

      // Eye
      ctx.fillStyle = "#fff";
      ctx.fillRect(player.x + 31, player.y + 3, 3, 3);

      // Gun
      ctx.fillStyle = "#666";
      ctx.fillRect(player.x + 34, player.y + 18, 16, 4);
      ctx.fillRect(player.x + 46, player.y + 16, 4, 8);
    }

    function drawObstacle(obs) {
      ctx.fillStyle = "#2f7d32";

      if (obs.kind === "cactus") {
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.fillRect(obs.x - 6, obs.y + 10, 6, 10);
        ctx.fillRect(obs.x + obs.width, obs.y + 14, 6, 12);
      } else if (obs.kind === "bird") {
        ctx.fillStyle = "#444";
        ctx.fillRect(obs.x, obs.y + 8, obs.width, 10);

        if (Math.floor(obs.flapFrame / 8) % 2 === 0) {
          ctx.fillRect(obs.x + 6, obs.y, 10, 8);
          ctx.fillRect(obs.x + 18, obs.y, 10, 8);
        } else {
          ctx.fillRect(obs.x + 6, obs.y + 12, 10, 8);
          ctx.fillRect(obs.x + 18, obs.y + 12, 10, 8);
        }
      } else if (obs.kind === "rock") {
        ctx.fillStyle = "#6b6b6b";
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.fillStyle = "#555";
        ctx.fillRect(obs.x + 8, obs.y + 8, 8, 8);
        ctx.fillRect(obs.x + 24, obs.y + 14, 6, 6);
      }
    }

    function drawBullets() {
      for (const bullet of bullets) {
        // glow
        ctx.fillStyle = "rgba(255,200,0,0.4)";
        ctx.fillRect(bullet.x - 4, bullet.y - 2, bullet.width + 8, bullet.height + 4);

        // main bullet
        ctx.fillStyle = "#ffcc00";
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);

        // tip
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(bullet.x + bullet.width, bullet.y + 1, 3, bullet.height - 2);
      }
    }
    }

    function drawCloud(cloud) {
      ctx.fillStyle = "#d9d9d9";
      ctx.beginPath();
      ctx.arc(cloud.x, cloud.y, 12, 0, Math.PI * 2);
      ctx.arc(cloud.x + 15, cloud.y - 8, 14, 0, Math.PI * 2);
      ctx.arc(cloud.x + 32, cloud.y, 12, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawScore() {
      ctx.fillStyle = "#333";
      ctx.font = "20px Arial";
      ctx.fillText(`Score: ${score}`, 20, 30);
      ctx.fillText(`High Score: ${highScore}`, 20, 55);
      ctx.font = "14px Arial";
      ctx.fillText("Shoot: F or Ctrl", 20, 78);
    }

    function drawStartMessage() {
      ctx.fillStyle = "#333";
      ctx.font = "24px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Press SPACE to start", canvas.width / 2, 80);
      ctx.textAlign = "left";
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#222";
      ctx.font = "36px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Game Over", canvas.width / 2, 110);

      ctx.font = "24px Arial";
      ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 155);
      ctx.fillText("Press R to restart", canvas.width / 2, 195);
      ctx.textAlign = "left";
    }

    function update() {
      if (gameOver) return;

      frameCount++;
      updateClouds();

      if (!started) return;

      // Activate boss at 50
      if (score >= 50 && !bossActive && !bossDefeated) {
        bossActive = true;
        bossHealth = 20;
        bossX = canvas.width + 100;
      }

      updatePlayer();
      updateObstacles();
      updateBullets();
      checkCollision();

      // Boss movement
      if (bossActive) {
        bossX -= gameSpeed * 0.7;

        if (frameCount % 40 === 0) {
          obstacles.push({
            x: bossX,
            y: groundY - 30,
            width: 20,
            height: 30,
            kind: "cactus"
          });
        }

        if (bossX < -200) {
          bossActive = false;
          score += 10;
        }
      } else {
        // Normal spawn rate
        let spawnRate = Math.max(55, 120 - Math.floor(score * 1.5));

        if (score >= 25) {
          spawnRate = 20;
          if (frameCount % 40 === 0) spawnObstacle();
        }

        if (frameCount % spawnRate === 0) {
          spawnObstacle();
        }
      }

      if (frameCount % 300 === 0) {
        gameSpeed += 0.35;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const cloud of clouds) {
        drawCloud(cloud);
      }

      drawGround();
      drawPlayer();

      // Draw boss
      if (bossActive) {
        ctx.fillStyle = "#b22222";
        ctx.fillRect(bossX, groundY - 80, 120, 60);

        ctx.fillStyle = "#fff";
        ctx.fillRect(bossX + 80, groundY - 65, 10, 10);

        ctx.fillStyle = "#000";
        ctx.fillRect(bossX + 82, groundY - 63, 5, 5);

        // health bar
        ctx.fillStyle = "#000";
        ctx.fillRect(300, 20, 300, 10);
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(300, 20, bossHealth * 15, 10);
      }

      for (const obs of obstacles) {
        drawObstacle(obs);
      }

      drawBullets();
      drawScore();

      if (bossDefeated) {
        ctx.fillStyle = "#222";
        ctx.font = "24px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Boss Defeated!", canvas.width / 2, 80);
        ctx.textAlign = "left";
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const cloud of clouds) {
        drawCloud(cloud);
      }

      drawGround();
      drawPlayer();

      for (const obs of obstacles) {
        drawObstacle(obs);
      }

      drawScore();

      if (!started && !gameOver) {
        drawStartMessage();
      }

      if (gameOver) {
        drawGameOver();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", (e) => {
      if (["Space", "ArrowUp", "KeyW"].includes(e.code)) {
        e.preventDefault();
        if (!started) started = true;
        jump();
      }

      if (["KeyF", "ControlLeft", "ControlRight"].includes(e.code)) {
        e.preventDefault();
        if (!started) started = true;
        shoot();
      }

      if (e.code === "KeyR") {
        restartGame();
      }
    });

    gameLoop();
  </script>
</body>
</html>
